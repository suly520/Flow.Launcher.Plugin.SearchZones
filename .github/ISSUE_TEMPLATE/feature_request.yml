name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to see.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this be useful? How would you use it?
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any mockups, examples, or references.
    validations:
      required: false
