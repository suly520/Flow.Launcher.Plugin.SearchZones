name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Type `sz ...`
        2. Select '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: false
  - type: input
    id: fl-version
    attributes:
      label: Flow Launcher version
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
    validations:
      required: false
  - type: dropdown
    id: everything
    attributes:
      label: Everything SDK installed?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: false
